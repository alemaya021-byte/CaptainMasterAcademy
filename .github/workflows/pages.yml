name: Deploy Captain Master Academy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run cloud sync regression suite
        run: node tests/cloud-sync-regression.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        shell: bash
        run: |
          rm -rf _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
