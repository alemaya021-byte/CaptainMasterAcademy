<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f5a7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Captain Academy">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Timed Exam - Captain Master Academy</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header data-app-header></header>
      <main class="main">
        <section class="page-head">
          <div>
            <p class="eyebrow">Captain promotional exam simulator</p>
            <h1>Run a full 125-question timed simulation.</h1>
          </div>
          <div class="timer" data-exam-timer>00:00</div>
        </section>

        <section class="panel" data-exam-setup>
          <div class="filter-row">
            <div class="field">
              <label for="exam-size">Exam length</label>
              <select id="exam-size" data-exam-size>
                <option value="25">25 questions</option>
                <option value="50">50 questions</option>
                <option value="75">75 questions</option>
                <option value="125" selected>125 questions</option>
              </select>
            </div>
            <div class="field">
              <label for="exam-blueprint">Blueprint</label>
              <select id="exam-blueprint" data-exam-blueprint></select>
            </div>
            <div class="field">
              <label for="exam-category">Book</label>
              <select id="exam-category" data-filter-category></select>
            </div>
            <div class="field">
              <label for="exam-difficulty">Difficulty</label>
              <select id="exam-difficulty" data-filter-difficulty></select>
            </div>
            <div class="field wide">
              <label for="exam-search">Search</label>
              <input id="exam-search" data-filter-query placeholder="Policy, SOP, chapter, keyword, tag">
            </div>
            <button class="button" type="button" data-start-exam>Start Exam</button>
          </div>
          <p class="muted" style="margin-top:10px">The 125-question simulator uses a required timer and withholds feedback until final submission.</p>
          <div class="empty hidden" style="margin-top:12px" data-resume-panel></div>
        </section>

        <section class="grid two" style="margin-top:16px">
          <div class="question-card" data-exam-card>
            <div class="empty">Choose an exam length and start.</div>
          </div>
          <aside class="panel stack">
            <h2>Exam Status</h2>
            <div class="grid two">
              <div class="stat-card"><div class="label">Question</div><div class="value" data-exam-position>0</div></div>
              <div class="stat-card"><div class="label">Answered</div><div class="value" data-exam-answered>0</div></div>
            </div>
            <h2>Question Navigator</h2>
            <div class="navigator" data-exam-navigator></div>
            <div data-exam-results></div>
          </aside>
        </section>
      </main>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/adaptiveEngine.js"></script>
    <script src="js/sync.js"></script>
    <script type="module" src="js/syncEngine.js"></script>
    <script src="js/app.js"></script>
    <script src="js/exam.js"></script>
  </body>
</html>
