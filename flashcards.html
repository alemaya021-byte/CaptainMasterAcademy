<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f5a7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Captain Academy">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Flashcards - Captain Master Academy</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header data-app-header></header>
      <main class="main">
        <section class="page-head">
          <div>
            <p class="eyebrow">Flashcards</p>
            <h1>Flip source-backed questions into active recall.</h1>
          </div>
          <div class="action-row">
            <button class="ghost-button" type="button" data-card-bookmarks>Bookmarks</button>
            <button class="ghost-button" type="button" data-card-missed>Missed</button>
            <button class="ghost-button" type="button" data-card-due>Due Reviews</button>
            <button class="ghost-button" type="button" data-card-shuffle>Shuffle</button>
          </div>
        </section>

        <section class="panel">
          <div class="filter-row">
            <div class="field wide">
              <label for="card-search">Search</label>
              <input id="card-search" data-filter-query placeholder="Policy, SOP, keyword, tag">
            </div>
            <div class="field">
              <label for="card-category">Book</label>
              <select id="card-category" data-filter-category></select>
            </div>
            <div class="field">
              <label for="card-difficulty">Difficulty</label>
              <select id="card-difficulty" data-filter-difficulty></select>
            </div>
            <div class="field">
              <label for="card-tag">Tag</label>
              <select id="card-tag" data-filter-tag></select>
            </div>
          </div>
        </section>

        <section style="margin-top:16px">
          <div class="flashcard" data-flashcard>
            <div class="empty">Loading flashcards...</div>
          </div>
          <div class="toolbar" style="margin-top:14px">
            <div class="pill-row">
              <span class="pill" data-card-count>0 cards</span>
              <span class="pill" data-card-position>0 / 0</span>
            </div>
            <div class="action-row">
              <button class="ghost-button" type="button" data-card-prev>Previous</button>
              <button class="button" type="button" data-card-flip>Flip</button>
              <button class="button bad" type="button" data-card-again>Again</button>
              <button class="button warn" type="button" data-card-hard>Hard</button>
              <button class="button good" type="button" data-card-good>Good</button>
              <button class="button" type="button" data-card-easy>Easy</button>
              <button class="ghost-button" type="button" data-card-next>Next</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/flashcards.js"></script>
  </body>
</html>
