<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f5a7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Captain Academy">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Quiz - Captain Master Academy</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header data-app-header></header>
      <main class="main">
        <section class="page-head">
          <div>
            <p class="eyebrow">Promotional exam practice</p>
            <h1>One question at a time, just like the exam room.</h1>
          </div>
          <div class="action-row">
            <button class="ghost-button" type="button" data-normal-mode>All Questions</button>
            <button class="ghost-button" type="button" data-adaptive-mode>Adaptive Study</button>
            <button class="ghost-button" type="button" data-missed-review>Missed Questions Only</button>
            <button class="ghost-button" type="button" data-bookmark-review>Bookmarked Questions</button>
            <button class="ghost-button" type="button" data-needs-review>Needs Review</button>
          </div>
        </section>

        <section class="panel">
          <div class="filter-row">
            <div class="field wide">
              <label for="quiz-search">Search</label>
              <input id="quiz-search" data-filter-query placeholder="Policy, SOP, chapter, keyword, tag">
            </div>
            <div class="field">
              <label for="quiz-category">Book</label>
              <select id="quiz-category" data-filter-category></select>
            </div>
            <div class="field">
              <label for="quiz-difficulty">Difficulty</label>
              <select id="quiz-difficulty" data-filter-difficulty></select>
            </div>
            <div class="field">
              <label for="quiz-tag">Tag</label>
              <select id="quiz-tag" data-filter-tag></select>
            </div>
            <div class="field">
              <label for="quiz-probability">Probability</label>
              <select id="quiz-probability" data-filter-probability></select>
            </div>
            <div class="field">
              <label for="quiz-timer">Timer</label>
              <select id="quiz-timer" data-quiz-timer-select>
                <option value="0">No timer</option>
                <option value="15">15 minutes</option>
                <option value="30">30 minutes</option>
                <option value="60">60 minutes</option>
              </select>
            </div>
          </div>
        </section>

        <section class="grid two" style="margin-top:16px">
          <div class="stack">
            <div class="question-card" data-quiz-card>
              <div class="empty">Loading questions...</div>
            </div>
          </div>
          <aside class="panel stack">
            <h2>Running Score</h2>
            <div class="empty hidden" data-study-note></div>
            <div class="grid two">
              <div class="stat-card"><div class="label">Correct</div><div class="value" data-score-correct>0</div></div>
              <div class="stat-card"><div class="label">Answered</div><div class="value" data-score-total>0</div></div>
            </div>
            <div class="stat-card">
              <div class="label">Time Remaining</div>
              <div class="value timer" data-quiz-timer>--:--</div>
            </div>
            <div class="source-score">
              <strong data-score-percent>0%</strong>
              <span class="muted">Current quiz accuracy</span>
              <div class="bar"><span data-score-bar></span></div>
            </div>
            <h2>Score By Source</h2>
            <div data-source-scores></div>
            <h2>Study Coach</h2>
            <div data-study-coach></div>
          </aside>
        </section>
      </main>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
