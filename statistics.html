<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f5a7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Captain Academy">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Statistics - Captain Master Academy</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header data-app-header></header>
      <main class="main">
        <section class="page-head">
          <div>
            <p class="eyebrow">Analytics dashboard</p>
            <h1>Overall score, weak areas, streaks, and progress graphs.</h1>
          </div>
          <button class="ghost-button" type="button" data-reset-progress>Reset Progress</button>
        </section>

        <section class="grid three" data-summary-cards></section>

        <section class="grid two" style="margin-top:16px">
          <div class="panel stack">
            <h2>Accuracy By Exam Area</h2>
            <div data-area-table></div>
          </div>
          <aside class="panel stack">
            <h2>Progress Graphs</h2>
            <div data-daily-graph></div>
            <div data-weekly-graph></div>
          </aside>
        </section>

        <section class="grid two" style="margin-top:16px">
          <div class="panel stack">
            <h2>Score By Source</h2>
            <div class="table-wrap" data-source-table></div>
          </div>
          <aside class="panel stack">
            <h2>Missed Questions</h2>
            <div data-missed-list></div>
            <h2>Bookmarks</h2>
            <div data-bookmark-list></div>
          </aside>
        </section>
      </main>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/statistics.js"></script>
  </body>
</html>
